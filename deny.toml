# Documentation for this configuration file can be found here
# https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
targets = [
    { triple = "aarch64-unknown-linux-musl" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

# https://embarkstudios.github.io/cargo-deny/checks/licenses/cfg.html
[licenses]
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "bzip2-1.0.6",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "LGPL-3.0-or-later",
    "MIT",
    "MPL-2.0",
    "PostgreSQL",
    "Unicode-3.0",
    "WTFPL",
    "Zlib",
]

[advisories]
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "rsa: potential key recovery through timing sidechannels" },
    { id = "RUSTSEC-2024-0320", reason = "yaml-rust: unmaintained" },
    { id = "RUSTSEC-2024-0363", reason = "sqlx: Binary Protocol Misinterpretation caused by Truncating or Overflowing Casts" },
    { id = "RUSTSEC-2024-0436", reason = "paste: unmaintained" },
    { id = "RUSTSEC-2025-0052", reason = "async-std: discontinued" },
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile: unmaintained" },
    { id = "RUSTSEC-2025-0141", reason = "bincode: unmaintained" },
    { id = "RUSTSEC-2026-0049", reason = "rustls-webpki: CRL Distribution Point matching logic; constrained by transitive dependencies at 0.102.x" },
    { id = "RUSTSEC-2026-0066", reason = "astral-tokio-tar: Insufficient validation of PAX extensions; constrained by testcontainers" },
    { id = "RUSTSEC-2026-0097", reason = "rand: unsound with custom logger using rand::rng(); constrained by transitive dependencies at 0.8.x" },
]

# https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html
[bans]
deny = []
multiple-versions = "deny"
wildcards = "allow"
